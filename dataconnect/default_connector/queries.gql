# Pobieranie wszystkich zgłoszeń na mapę
query GetReports @auth(level: PUBLIC) {
  reports {
    id
    latitude
    longitude
    description
    status
    category {
      name
      iconName
      pinColor
    }
    reportPhotos_on_report {
      imageUrl
    }
    upvotes_on_report {
      id
    }
  }
}

# Pobieranie niezakończonych zgłoszeń
query GetActiveReports @auth(level: PUBLIC) {
  reports(where: { status: { ne: "ZAKONCZONE" } }) {
    id
    latitude
    longitude
    description
    status
    category {
      name
      iconName
      pinColor
    }
    reportPhotos_on_report {
      imageUrl
    }
    upvotes_on_report {
      id
    }
  }
}

# Pobieranie zgłoszeń zalogowanego użytkownika
query GetMyReports @auth(level: USER) {
  reports(where: { userId: { eq_expr: "auth.uid" } }) {
    id
    latitude
    longitude
    description
    status
    category {
      name
      iconName
      pinColor
    }
    reportPhotos_on_report {
      imageUrl
    }
    upvotes_on_report {
      id
    }
  }
}

# Pobieranie listy kategorii
query GetCategories @auth(level: PUBLIC) {
  categories {
    id
    name
    iconName
  }
}